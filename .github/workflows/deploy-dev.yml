name: Deploy Dev

on:
  push:
    branches: [dev]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev

      - name: Copy infra files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: 'infra/docker-compose.prod.yml,infra/Caddyfile'
          target: /opt/app
          strip_components: 1

      - name: Write env file and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DEV_PUBLIC_SUPABASE_URL,DEV_PUBLIC_SUPABASE_PUBLISHABLE_KEY,DEV_SUPABASE_SECRET_KEY,DEV_ORIGIN
          script: |
            cd /opt/app
            cat > .env.dev << EOF
            PUBLIC_SUPABASE_URL=$DEV_PUBLIC_SUPABASE_URL
            PUBLIC_SUPABASE_PUBLISHABLE_KEY=$DEV_PUBLIC_SUPABASE_PUBLISHABLE_KEY
            SUPABASE_SECRET_KEY=$DEV_SUPABASE_SECRET_KEY
            ORIGIN=$DEV_ORIGIN
            EOF
            docker compose -f docker-compose.prod.yml pull dev
            docker compose -f docker-compose.prod.yml up -d dev caddy
        env:
          DEV_PUBLIC_SUPABASE_URL: ${{ secrets.DEV_PUBLIC_SUPABASE_URL }}
          DEV_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.DEV_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          DEV_SUPABASE_SECRET_KEY: ${{ secrets.DEV_SUPABASE_SECRET_KEY }}
          DEV_ORIGIN: ${{ secrets.DEV_ORIGIN }}
